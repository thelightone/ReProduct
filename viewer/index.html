<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>3D Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #viewer-wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* радиальный градиент */
            background: radial-gradient( circle at center, #f5f5f5 0%, #e0e0e0 40%, #c8c8c8 70%, #a8a8a8 100% );
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #loader {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #555;
        }
    </style>
</head>
<body>
    <div id="viewer-wrap">
        <canvas id="viewer"></canvas>

        <div id="loader">
            <div id="progress"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

        const canvas = document.getElementById('viewer');
        const progressBar = document.getElementById('progress');
        const loader = document.getElementById('loader');

        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.01,
            1000
        );
        camera.position.set(0, 1.5, 3);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // свет (простой и стабильный)
        const ambient = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // пол (тень)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.2 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        // параметры
        const params = new URLSearchParams(window.location.search);
        const client = params.get('client') || 'demo';
        const product = params.get('product') || 'chair01';

        const modelUrl = `./StreamingAssets/clients/${client}/products/${product}/model.glb`;
        console.log('Loading:', modelUrl);

        const loaderGLTF = new GLTFLoader();

        loaderGLTF.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;

                model.traverse((obj) => {
                    if (obj.isMesh) {
                        obj.castShadow = true;
                        obj.receiveShadow = true;
                    }
                });

                // центрирование
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                model.position.sub(center);
                model.position.y += size.y / 2;

                scene.add(model);

                // подгон камеры
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

                cameraZ *= 1.8;
                camera.position.set(0, maxDim * 0.6, cameraZ);

                controls.target.set(0, size.y / 2, 0);
                controls.update();

                loader.style.display = 'none';

                console.log('MODEL LOADED');
            },
            (xhr) => {
                if (xhr.total) {
                    const percent = (xhr.loaded / xhr.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            },
            (err) => {
                console.error('ERROR:', err);
            }
        );

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
