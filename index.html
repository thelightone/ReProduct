<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Viewer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .viewer {
            border-radius: 16px;
            overflow: hidden;
            background: #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Modern Sofa</h1>
        <p>3D preview of the product</p>

        <div class="viewer">
            <iframe src="./viewer/index.html?client=demo&product=sofa01"
                    loading="lazy"
                    allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
