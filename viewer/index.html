<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>3D Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
            font-family: Arial, sans-serif;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            z-index: 10;
        }

        .loader {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            font-size: 16px;
            opacity: 0.95;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: white;
            transition: width 0.15s ease;
        }

            .progress-fill.indeterminate {
                width: 40%;
                position: absolute;
                left: -40%;
                animation: indeterminate 1.2s linear infinite;
            }

        .progress-text {
            font-size: 14px;
            opacity: 0.85;
        }

        #error {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 16px;
            padding: 12px 14px;
            color: white;
            background: rgba(180, 40, 40, 0.95);
            border-radius: 10px;
            display: none;
            z-index: 20;
            white-space: pre-wrap;
        }

        canvas {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes indeterminate {
            0% {
                left: -40%;
            }

            100% {
                left: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading">
            <div class="loader">
                <div class="spinner"></div>
                <div class="text" id="loading-text">Loading 3D...</div>
                <div class="progress-bar">
                    <div class="progress-fill indeterminate" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">Starting...</div>
            </div>
        </div>

        <div id="error"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.179.1/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.179.1/examples/jsm/loaders/GLTFLoader.js';

        const app = document.getElementById('app');
        const loadingEl = document.getElementById('loading');
        const loadingTextEl = document.getElementById('loading-text');
        const progressFillEl = document.getElementById('progress-fill');
        const progressTextEl = document.getElementById('progress-text');
        const errorEl = document.getElementById('error');

        function setProgress(percent, text = 'Loading 3D...') {
            progressFillEl.classList.remove('indeterminate');
            const clamped = Math.max(0, Math.min(100, Math.round(percent)));
            progressFillEl.style.width = clamped + '%';
            progressTextEl.textContent = clamped + '%';
            loadingTextEl.textContent = text;
        }

        function setIndeterminate(text = 'Loading 3D...') {
            progressFillEl.classList.add('indeterminate');
            progressFillEl.style.width = '40%';
            progressTextEl.textContent = 'Loading...';
            loadingTextEl.textContent = text;
        }

        function showError(message) {
            console.error(message);
            errorEl.style.display = 'block';
            errorEl.textContent = String(message);
            loadingEl.style.display = 'none';
        }

        function getParam(name, fallback = '') {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || fallback;
        }

        function getConfigUrl(client, product) {
            return `./StreamingAssets/clients/${encodeURIComponent(client)}/products/${encodeURIComponent(product)}/config.json`;
        }

        function getModelUrl(relativePath) {
            return `./StreamingAssets/${relativePath}`;
        }

        function frameObject(camera, controls, object) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const maxSize = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let distance = maxSize / (2 * Math.tan(fov / 2));
            distance *= 1.6;

            camera.position.set(center.x, center.y + maxSize * 0.15, center.z + distance);
            camera.near = Math.max(distance / 100, 0.01);
            camera.far = distance * 100;
            camera.updateProjectionMatrix();

            controls.target.copy(center);
            controls.update();
        }

        async function main() {
            const client = getParam('client', 'demo');
            const product = getParam('product', 'sofa01');

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            app.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e1e1e);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambient);

            const dir = new THREE.DirectionalLight(0xffffff, 2.0);
            dir.position.set(3, 5, 4);
            scene.add(dir);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            try {
                setProgress(5, 'Loading config...');

                const configUrl = getConfigUrl(client, product);
                const configRes = await fetch(configUrl);

                if (!configRes.ok) {
                    throw new Error(`Failed to load config.json: ${configRes.status} ${configRes.statusText}`);
                }

                const config = await configRes.json();

                if (!config.modelUrl) {
                    throw new Error('config.json has no modelUrl');
                }

                setIndeterminate('Loading model...');

                const modelUrl = getModelUrl(config.modelUrl);
                const loader = new GLTFLoader();

                const gltf = await new Promise((resolve, reject) => {
                    loader.load(
                        modelUrl,
                        resolve,
                        (event) => {
                            if (event.total && event.total > 0) {
                                const modelProgress = event.loaded / event.total;
                                const percent = 15 + modelProgress * 80;
                                setProgress(percent, 'Loading model...');
                            } else {
                                setIndeterminate('Loading model...');
                            }
                        },
                        reject
                    );
                });

                setProgress(97, 'Preparing scene...');

                const model = gltf.scene;
                scene.add(model);
                frameObject(camera, controls, model);

                setProgress(100, 'Done');

                setTimeout(() => {
                    loadingEl.style.display = 'none';
                }, 150);

                renderer.setAnimationLoop(() => {
                    controls.update();
                    renderer.render(scene, camera);
                });
            } catch (err) {
                showError(err);
            }
        }

        main();
    </script>
</body>
</html>
