<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Viewer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .viewer {
            border-radius: 16px;
            overflow: hidden;
            background: #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 700px;
            border: 0;
            display: block;
            background: #1e1e1e;
        }

        .embed-code {
            margin-top: 20px;
            padding: 16px;
            background: #111;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="page-title">3D Product Viewer</h1>
        <p>Interactive product preview</p>

        <div class="viewer">
            <iframe id="viewer-frame"
                    loading="lazy"
                    allowfullscreen>
            </iframe>
        </div>

        <h3>Embed code:</h3>
        <div class="embed-code" id="embed-code"></div>
    </div>

    <script>
        function getParam(name, fallback) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || fallback;
        }

        const client = getParam("client", "demo");
        const product = getParam("product", "sofa01");

        const viewerUrl = `./viewer/index.html?client=${encodeURIComponent(client)}&product=${encodeURIComponent(product)}`;

        const frame = document.getElementById("viewer-frame");
        frame.src = viewerUrl;

        const fullEmbedUrl = `${window.location.origin}${window.location.pathname.replace(/index\.html$/, "")}viewer/index.html?client=${encodeURIComponent(client)}&product=${encodeURIComponent(product)}`;

        document.getElementById("embed-code").textContent =
            `<iframe
      src="${fullEmbedUrl}"
      width="100%"
      height="700"
      style="border:0; display:block;"
      loading="lazy"
      allowfullscreen>
</iframe>`;
    </script>
</body>
</html>
