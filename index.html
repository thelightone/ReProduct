<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Viewer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #111;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 48px;
            line-height: 1.1;
        }

        p {
            margin: 0 0 28px;
            font-size: 18px;
            line-height: 1.4;
        }

        .viewer {
            border-radius: 24px;
            overflow: hidden;
            background: #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 700px;
            border: 0;
            display: block;
            background: #1e1e1e;
        }

        .embed-title {
            margin-top: 28px;
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 700;
        }

        .embed-code {
            padding: 16px;
            background: #111;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .container {
                margin: 24px auto;
                padding: 0 12px;
            }

            h1 {
                font-size: 36px;
            }

            iframe {
                height: 520px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>3D Product Viewer</h1>
        <p>Interactive product preview</p>

        <div class="viewer">
            <iframe id="viewer-frame"
                    loading="lazy"
                    allowfullscreen>
            </iframe>
        </div>

        <div class="embed-title">Embed code:</div>
        <div class="embed-code" id="embed-code"></div>
    </div>

    <script>
        function getParam(name, fallback) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || fallback;
        }

        const client = getParam("client", "demo");
        const product = getParam("product", "sofa01");

        const viewerUrl = `./viewer/index.html?client=${encodeURIComponent(client)}&product=${encodeURIComponent(product)}`;

        const frame = document.getElementById("viewer-frame");
        frame.src = viewerUrl;

        const basePath = window.location.pathname.replace(/index\.html$/, "");
        const fullEmbedUrl =
            `${window.location.origin}${basePath}viewer/index.html?client=${encodeURIComponent(client)}&product=${encodeURIComponent(product)}`;

        document.getElementById("embed-code").textContent =
            `<iframe
      src="${fullEmbedUrl}"
      width="100%"
      height="700"
      style="border:0; display:block;"
      loading="lazy"
      allowfullscreen>
</iframe>`;
    </script>
</body>
</html>
