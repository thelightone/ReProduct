<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>3D Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        #viewer-wrap {
            width: 100vw;
            height: 100vh;
            /* радиальный градиент: светлее в центре */
            background: radial-gradient( circle at center, #ffffff 0%, #eeeeee 35%, #d6d6d6 65%, #bcbcbc 100% );
            position: relative;
        }

        canvas {
            display: block;
        }

        #loader {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #555;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <div id="viewer-wrap">
        <canvas id="viewer"></canvas>

        <div id="loader">
            <div id="progress"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
        import { RGBELoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/RGBELoader.js';

        const canvas = document.getElementById('viewer');
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(2, 1.5, 3);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // свет
        const ambient = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;

        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;

        scene.add(dirLight);

        // пол для тени
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.2 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.001;
        floor.receiveShadow = true;
        scene.add(floor);

        // загрузка HDRI (для нормальных отражений)
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        new RGBELoader().load(
            'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_03_1k.hdr',
            (hdr) => {
                const envMap = pmremGenerator.fromEquirectangular(hdr).texture;
                scene.environment = envMap;
                hdr.dispose();
                pmremGenerator.dispose();
            }
        );

        // загрузка модели
        const params = new URLSearchParams(window.location.search);
        const client = params.get('client') || 'demo';
        const product = params.get('product') || 'chair01';

        const modelUrl = `./StreamingAssets/clients/${client}/products/${product}/model.glb`;

        const loader = new GLTFLoader();
        const progressBar = document.getElementById('progress');

        loader.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;

                model.traverse((obj) => {
                    if (obj.isMesh) {
                        obj.castShadow = true;
                        obj.receiveShadow = true;
                    }
                });

                // центрируем модель
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                // ставим на пол
                const size = box.getSize(new THREE.Vector3());
                model.position.y += size.y / 2;

                scene.add(model);

                document.getElementById('loader').style.display = 'none';
            },
            (xhr) => {
                if (xhr.total) {
                    const percent = (xhr.loaded / xhr.total) * 100;
                    progressBar.style.width = percent + '%';
                }
            },
            (err) => {
                console.error('Load error:', err);
            }
        );

        // ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // рендер
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
