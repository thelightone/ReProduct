<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>3D Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #ffffff 0%, #e0e0e0 18%, #b0b0b0 45%, #6a6a6a 100%);
            font-family: Arial, sans-serif;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #ffffff 0%, #eeeeee 40%, #d0d0d0 70%, #b5b5b5 100%);
            z-index: 10;
        }

        .loader {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #333;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0,0,0,0.15);
            border-top: 4px solid #555;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text {
            font-size: 16px;
            opacity: 0.95;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.12);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #555;
            transition: width 0.15s ease;
        }

            .progress-fill.indeterminate {
                width: 40%;
                position: absolute;
                left: -40%;
                animation: indeterminate 1.2s linear infinite;
            }

        .progress-text {
            font-size: 14px;
            opacity: 0.85;
        }

        #error {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 16px;
            padding: 12px 14px;
            color: white;
            background: rgba(180, 40, 40, 0.95);
            border-radius: 10px;
            display: none;
            z-index: 20;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.4;
        }

        canvas {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes indeterminate {
            0% {
                left: -40%;
            }

            100% {
                left: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading">
            <div class="loader">
                <div class="spinner"></div>
                <div class="text" id="loading-text">Starting...</div>
                <div class="progress-bar">
                    <div class="progress-fill indeterminate" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">Starting...</div>
            </div>
        </div>

        <div id="error"></div>
    </div>

    <script>
        window.addEventListener('error', (e) => {
            const errorEl = document.getElementById('error');
            const loadingTextEl = document.getElementById('loading-text');
            const progressTextEl = document.getElementById('progress-text');

            loadingTextEl.textContent = 'JS error';
            progressTextEl.textContent = 'Failed';
            errorEl.style.display = 'block';
            errorEl.textContent = `window.error:\n${e.message}\n${e.filename || ''}:${e.lineno || ''}`;
        });

        window.addEventListener('unhandledrejection', (e) => {
            const errorEl = document.getElementById('error');
            const loadingTextEl = document.getElementById('loading-text');
            const progressTextEl = document.getElementById('progress-text');

            loadingTextEl.textContent = 'Promise error';
            progressTextEl.textContent = 'Failed';
            errorEl.style.display = 'block';
            errorEl.textContent = `unhandledrejection:\n${e.reason}`;
        });
    </script>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.179.1';
        import { OrbitControls } from 'https://esm.sh/three@0.179.1/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://esm.sh/three@0.179.1/examples/jsm/loaders/GLTFLoader.js';

        const app = document.getElementById('app');
        const loadingEl = document.getElementById('loading');
        const loadingTextEl = document.getElementById('loading-text');
        const progressFillEl = document.getElementById('progress-fill');
        const progressTextEl = document.getElementById('progress-text');
        const errorEl = document.getElementById('error');

        function setProgress(percent, text = 'Loading...') {
            progressFillEl.classList.remove('indeterminate');
            const clamped = Math.max(0, Math.min(100, Math.round(percent)));
            progressFillEl.style.width = clamped + '%';
            progressTextEl.textContent = clamped + '%';
            loadingTextEl.textContent = text;
        }

        function setIndeterminate(text = 'Loading...') {
            progressFillEl.classList.add('indeterminate');
            progressFillEl.style.width = '40%';
            progressTextEl.textContent = 'Loading...';
            loadingTextEl.textContent = text;
        }

        function showError(message) {
            console.error(message);
            errorEl.style.display = 'block';
            errorEl.textContent = String(message);
            loadingTextEl.textContent = 'Error';
            progressTextEl.textContent = 'Failed';
        }

        function getParam(name, fallback = '') {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || fallback;
        }

        function getConfigUrl(client, product) {
            return `./StreamingAssets/clients/${encodeURIComponent(client)}/products/${encodeURIComponent(product)}/config.json`;
        }

        function getModelUrl(relativePath) {
            return `./StreamingAssets/${relativePath}`;
        }

        function frameObject(camera, controls, object) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const maxSize = Math.max(size.x, size.y, size.z);
            const fov = THREE.MathUtils.degToRad(camera.fov);

            let distance = maxSize / (2 * Math.tan(fov / 2));
            distance *= 1.3;

            const verticalOffset = size.y * 0.08;

            camera.position.set(
                center.x,
                center.y + verticalOffset,
                center.z + distance
            );

            camera.near = Math.max(distance / 100, 0.01);
            camera.far = Math.max(distance * 100, 1000);
            camera.updateProjectionMatrix();

            controls.target.set(center.x, center.y + verticalOffset * 0.5, center.z);

            controls.minDistance = 0.01;
            controls.maxDistance = 1000;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI * 0.56;
            controls.minPolarAngle = Math.PI * 0.38;
            controls.update();
        }

        async function main() {
            const client = getParam('client', 'demo');
            const product = getParam('product', 'sofa01');

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            app.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            scene.background = null;

            const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.01, 2000);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2;
            controls.enablePan = false;
            controls.screenSpacePanning = false;

            let autoRotateTimeout = null;

            function pauseAutoRotate() {
                controls.autoRotate = false;
                clearTimeout(autoRotateTimeout);
                autoRotateTimeout = setTimeout(() => {
                    controls.autoRotate = true;
                }, 3000);
            }

            controls.addEventListener('start', pauseAutoRotate);
            renderer.domElement.addEventListener('pointerdown', pauseAutoRotate);
            renderer.domElement.addEventListener('wheel', pauseAutoRotate, { passive: true });
            renderer.domElement.addEventListener('touchstart', pauseAutoRotate, { passive: true });

            const ambient = new THREE.AmbientLight(0xffffff, 1.35);
            scene.add(ambient);

            const dir1 = new THREE.DirectionalLight(0xffffff, 1.9);
            dir1.position.set(4, 6, 5);
            scene.add(dir1);

            const dir2 = new THREE.DirectionalLight(0xffffff, 0.7);
            dir2.position.set(-3, 2, -4);
            scene.add(dir2);

            let loadedModel = null;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);

                if (loadedModel) {
                    frameObject(camera, controls, loadedModel);
                }
            });

            try {
                setProgress(5, 'Loading config...');

                const configUrl = getConfigUrl(client, product);
                const configRes = await fetch(configUrl);

                if (!configRes.ok) {
                    throw new Error(`Failed to load config.json: ${configRes.status} ${configRes.statusText}\n${configUrl}`);
                }

                const config = await configRes.json();

                if (!config.modelUrl) {
                    throw new Error('config.json has no modelUrl');
                }

                setIndeterminate('Loading model...');

                const modelUrl = getModelUrl(config.modelUrl);
                const loader = new GLTFLoader();

                const gltf = await new Promise((resolve, reject) => {
                    loader.load(
                        modelUrl,
                        resolve,
                        (event) => {
                            if (event.total && event.total > 0) {
                                const modelProgress = event.loaded / event.total;
                                const percent = 15 + modelProgress * 80;
                                setProgress(percent, 'Loading model...');
                            } else {
                                setIndeterminate('Loading model...');
                            }
                        },
                        reject
                    );
                });

                setProgress(97, 'Preparing scene...');

                loadedModel = gltf.scene;
                scene.add(loadedModel);
                frameObject(camera, controls, loadedModel);

                setProgress(100, 'Done');

                setTimeout(() => {
                    loadingEl.style.display = 'none';
                }, 150);

                renderer.setAnimationLoop(() => {
                    controls.update();
                    renderer.render(scene, camera);
                });
            } catch (err) {
                showError(err);
            }
        }

        main();
    </script>
</body>
</html>
